server:
  port: 8088

spring:
  application:
    name: auth-service

  r2dbc:
    url: r2dbc:postgresql://postgres:5432/dataforge
    username: postgres
    password: postgres

jwt:
  secret: change-this-to-a-long-random-secret-key
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus