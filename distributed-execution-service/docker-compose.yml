version: '3.9'

services:

postgres:
image: postgres:16
container_name: execution-postgres
environment:
POSTGRES_DB: dataforge
POSTGRES_USER: postgres
POSTGRES_PASSWORD: postgres
ports:
  - "5434:5432"

zookeeper:
image: confluentinc/cp-zookeeper:7.6.1
container_name: execution-zookeeper
environment:
ZOOKEEPER_CLIENT_PORT: 2181
ports:
  - "2183:2181"

kafka:
image: confluentinc/cp-kafka:7.6.1
container_name: execution-kafka
depends_on:
  - zookeeper
ports:
  - "9094:9092"
environment:
KAFKA_BROKER_ID: 1
KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

distributed-execution-service:
build:
context: .
container_name: distributed-execution-service
depends_on:
  - postgres
  - kafka
ports:
  - "8086:8086"
