server:
  port: 8082

spring:
  application:
    name: ingestion-service

  kafka:
    bootstrap-servers: localhost:9092

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/dataforge_ingestion
    username: postgres
    password: postgres

  flyway:
    url: jdbc:postgresql://localhost:5432/dataforge_ingestion
    user: postgres
    password: postgres

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus